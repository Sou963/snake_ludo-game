<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ludo Pro - Vivid Edition</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="ludo.css" />
  </head>
  <body>
    <div class="ludo-board" id="board">
      <div class="base green">
        <div class="base-white" id="home-green"></div>
      </div>
      <div class="base yellow"><div class="base-white"></div></div>
      <div class="base blue"><div class="base-white"></div></div>
      <div class="base red"><div class="base-white" id="home-red"></div></div>

      <div class="center-main"></div>
    </div>

    <div class="ui-panel green-pos" id="ui-panel">
      <div id="turn-text" class="turn-indicator green-text">GREEN'S TURN</div>
      <div
        class="dice-box"
        id="dice-btn"
        onclick="rollDice()"
        style="color: var(--ludo-green)"
      >
        <i id="dice-icon" class="fas fa-dice-one"></i>
      </div>
    </div>

    <script src="ludo.js"></script>
  </body>
</html>
